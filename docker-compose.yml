services:
  mysql:
    image: mysql:8
    container_name: rhinora-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rhinora
      MYSQL_USER: rhinora
      MYSQL_PASSWORD: rhinora_local_password
      MYSQL_ROOT_PASSWORD: rhinora_root_password
    ports:
      - "3306:3306"
    volumes:
      - rhinora_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  rhinora_mysql_data:
